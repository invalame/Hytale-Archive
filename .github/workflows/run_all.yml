name: Weekly Hytale Scraper

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight UTC
  workflow_dispatch: # Allow manual trigger from the GitHub Actions tab

jobs:
  scrape_and_download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Record Start Time
        id: start_time
        run: echo "start=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Master Scraper (Phase 3 Metadata)
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          # REDDIT_API_KEY: ${{ secrets.REDDIT_API_KEY }} # Uncomment in the future
        run: |
          python run_all.py

      - name: Record End Time and Calculate Duration
        run: |
          end=$(date +%s)
          duration=$((end - start))
          hours=$((duration / 3600))
          minutes=$(( (duration % 3600) / 60 ))
          seconds=$((duration % 60))
          echo "=========================================="
          echo "   WORKFLOW DURATION: ${hours}h ${minutes}m ${seconds}s"
          echo "   (GitHub Actions time limit is 6 hours)"
          echo "=========================================="

      - name: Commit and Push Changes (Safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set up git config for the bot
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add only the database (bot zone)
          git add archivo_hytale.db
          
          # Only commit and push if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Automated update: database and physical files"
            
            # SAFEGUARD: Pull with rebase before pushing to avoid conflicts
            # if the user manually pushed code changes while this action was running
            git pull --rebase origin main
            
            git push origin main
          else
            echo "No changes detected. Nothing to commit."
          fi
